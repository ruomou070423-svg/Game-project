<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body { cursor: pointer; }

    /* ── Scene container ────────────────────────────────── */
    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .scene.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Full-screen background ─────────────────────────── */
    .scene-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ── Floating dialogue bubble ───────────────────────── */
    .scene-dialog {
      position: absolute;
      width: 32vw;
      max-width: 360px;
      height: auto;
      left: 3vw;
      top: 6vh;
      animation: float 3.5s ease-in-out infinite;
      user-select: none;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px);  }
      50%       { transform: translateY(-8px); }
    }


    /* ═══════════════════════════════════════════════════════
       STAGE 2 – Block Assembly Puzzle
    ═══════════════════════════════════════════════════════ */

    #scene3 {
      cursor: default;
      background: #bbb;
    }

    /*
     * Sheet and all blocks share the SAME 800×600 canvas.
     * They are all displayed at identical width (s3-canvas-w)
     * so the colored content in each PNG lands in exactly the
     * correct position when any block is placed over the sheet.
     */

    /* Sheet: centered anchor */
    #s3-sheet {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52vw;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: 2;
      user-select: none;
      pointer-events: none;
    }

    /* Snap-zone outlines: dashed border over the block target areas */
    .s3-zone {
      position: absolute;
      pointer-events: none;
      border: 2px dashed rgba(80, 80, 80, 0.45);
      border-radius: 4px;
      z-index: 3;
      transition: opacity 0.3s ease;
    }

    .s3-zone.s3-zone-filled {
      opacity: 0;
    }

    /* Draggable blocks – same canvas width as sheet */
    .s3-block {
      position: absolute;
      width: 52vw;
      height: auto;
      cursor: grab;
      user-select: none;
      z-index: 5;
      /* snap animation – disabled during drag, enabled on release */
      will-change: left, top;
    }

    .s3-block:active { cursor: grabbing; }

    /* When close enough to snap – soft glow hint */
    .s3-block.s3-near {
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.7));
    }

    /* After snap */
    .s3-block.s3-snapped {
      cursor: default;
      pointer-events: none;
      z-index: 4;
      filter: none;
    }
  </style>
</head>
<body>

  <!-- ── Scene 1: Boss intro ──────────────────────────── -->
  <div id="scene1" class="scene active">
    <div class="scene-bg"
         style="background-image: url('pngassets/Boss1.png');"></div>
    <img class="scene-dialog"
         src="pngassets/Dialog 1.png"
         alt="Boss dialogue 1"
         draggable="false">
  </div>

  <!-- ── Scene 2: Boss reply ──────────────────────────── -->
  <div id="scene2" class="scene">
    <div class="scene-bg"
         style="background-image: url('pngassets/Boss2.png');"></div>
    <img class="scene-dialog"
         src="pngassets/Dialog 2.png"
         alt="Boss dialogue 2"
         draggable="false">
  </div>

  <!-- ── Scene 3: Block Assembly Puzzle ───────────────── -->
  <div id="scene3" class="scene">

    <!-- Background paper (non-interactive anchor) -->
    <img id="s3-sheet" src="pngassets/sheet.png" alt="Sheet" draggable="false">

    <!--
      Snap-zone outlines (positioned by JS after layout is known).
      One per block; they disappear when the block snaps in.
    -->
    <div id="s3-zone1" class="s3-zone"></div>
    <div id="s3-zone2" class="s3-zone"></div>

    <!--
      Draggable blocks.
      All blocks use the same 800×600 canvas as sheet.png so
      their content composites perfectly when placed over the sheet.
    -->
    <img id="s3-block1" class="s3-block"
         src="pngassets/box 1.png"  alt="Block 1" draggable="false">
    <img id="s3-block2" class="s3-block"
         src="pngassets/box 2.png"  alt="Block 2" draggable="false">

  </div>


  <script>
    /* ═══════════════════════════════════════════════════
       Scene manager  (Scene 1 → 2 → 3)
    ═══════════════════════════════════════════════════ */
    (function () {
      var scenes = [
        document.getElementById('scene1'),
        document.getElementById('scene2'),
        document.getElementById('scene3'),
      ];
      var current      = 0;
      var stage2Inited = false;

      document.body.addEventListener('click', function () {
        var next = current + 1;
        if (next >= scenes.length) return;

        scenes[current].classList.remove('active');
        scenes[next].classList.add('active');
        current = next;

        if (next === 2 && !stage2Inited) {
          stage2Inited = true;
          // Wait for the scene fade-in (400 ms) before computing layout
          setTimeout(initStage2, 450);
        }
      });
    }());


    /* ═══════════════════════════════════════════════════
       Stage 2 – Block Assembly Puzzle
    ═══════════════════════════════════════════════════

       All assets share the 800 × 600 canvas.
       "Snap position" for every block = the sheet's top-left
       corner, so each block's colored content naturally falls
       into the correct area of the paper.

       Content-center coordinates (fraction of 800×600):
         block1 (box 1.png)  – tall dark rect,  lower-left of canvas
         block2 (box 2.png)  – small light rect, right-center of canvas
    ═══════════════════════════════════════════════════ */
    function initStage2() {

      var sheet  = document.getElementById('s3-sheet');

      /* ── Block definitions ──────────────────────────── */
      /*
       * cx / cy  : visual-content centre as fraction of 800×600 canvas.
       *            Used for snap-zone placement and proximity detection.
       * cw / ch  : visual-content size as fraction of canvas.
       *            Used to draw the dashed zone outline.
       *
       * box 1.png  content: approx x 218-403, y 152-468
       * box 2.png  content: approx x 445-568, y 157-328
       */
      var blocks = [
        {
          el : document.getElementById('s3-block1'),
          zone : document.getElementById('s3-zone1'),
          cx : (218 + 403) / 2 / 800,   // 0.388
          cy : (152 + 468) / 2 / 600,   // 0.517
          cw : (403 - 218)       / 800,  // 0.231
          ch : (468 - 152)       / 600,  // 0.527
          snapped : false
        },
        {
          el : document.getElementById('s3-block2'),
          zone : document.getElementById('s3-zone2'),
          cx : (445 + 568) / 2 / 800,   // 0.633
          cy : (157 + 328) / 2 / 600,   // 0.404
          cw : (568 - 445)       / 800,  // 0.154
          ch : (328 - 157)       / 600,  // 0.285
          snapped : false
        }
      ];

      var SNAP_RADIUS = 70; // px – how close before adsorption triggers

      /* ── Layout setup ───────────────────────────────── */
      var sr = sheet.getBoundingClientRect(); // sheet rect in viewport px

      // Position zone outlines over each block's target area on the sheet
      blocks.forEach(function (b) {
        var zLeft = sr.left + (b.cx - b.cw / 2) * sr.width;
        var zTop  = sr.top  + (b.cy - b.ch / 2) * sr.height;
        var zW    = b.cw * sr.width;
        var zH    = b.ch * sr.height;

        b.zone.style.left   = zLeft + 'px';
        b.zone.style.top    = zTop  + 'px';
        b.zone.style.width  = zW    + 'px';
        b.zone.style.height = zH    + 'px';
      });

      // Scatter blocks: place so each block's content is clearly visible
      // on the opposite side of the screen from the sheet centre.
      scatterBlock(blocks[0],  0.08, 0.48, sr); // content near left  edge
      scatterBlock(blocks[1],  0.90, 0.52, sr); // content near right edge

      // Wire up drag for each block
      blocks.forEach(function (b) { makeDraggable(b, sr); });


      /* ── Scatter helper ─────────────────────────────── */
      function scatterBlock(b, targetFracX, targetFracY, sr) {
        // Position the block so its visual-content centre lands at
        // (targetFracX * vw, targetFracY * vh) on screen.
        var screenX = window.innerWidth  * targetFracX;
        var screenY = window.innerHeight * targetFracY;
        b.el.style.left = (screenX - b.cx * sr.width)  + 'px';
        b.el.style.top  = (screenY - b.cy * sr.height) + 'px';
      }


      /* ── Snap-distance helper ───────────────────────── */
      function snapDist(b) {
        var br  = b.el.getBoundingClientRect();
        var cur = sheet.getBoundingClientRect(); // re-read (safe after resize)

        // Block's content centre on screen
        var bx = br.left  + b.cx * br.width;
        var by = br.top   + b.cy * br.height;

        // Target content centre (same fractions applied to sheet rect)
        var tx = cur.left + b.cx * cur.width;
        var ty = cur.top  + b.cy * cur.height;

        return Math.hypot(bx - tx, by - ty);
      }


      /* ── Snap / adsorption ──────────────────────────── */
      function trySnap(b) {
        if (b.snapped) return;
        var dist = snapDist(b);

        if (dist <= SNAP_RADIUS) {
          var cur = sheet.getBoundingClientRect();

          // Animate block to exact sheet overlay position
          b.el.style.transition = 'left 0.18s cubic-bezier(0.25,0.46,0.45,0.94),' +
                                   'top  0.18s cubic-bezier(0.25,0.46,0.45,0.94)';
          b.el.style.left = cur.left + 'px';
          b.el.style.top  = cur.top  + 'px';

          b.snapped = true;
          b.el.classList.remove('s3-near');
          b.el.classList.add('s3-snapped');

          // Fade out the dashed zone outline
          b.zone.classList.add('s3-zone-filled');
        }
      }


      /* ── Drag logic ─────────────────────────────────── */
      function makeDraggable(b, _sr) {
        var el = b.el;

        function start(clientX, clientY) {
          if (b.snapped) return;

          el.style.transition = 'none'; // crisp during drag
          el.style.zIndex     = '10';   // float above everything

          var startL = parseFloat(el.style.left) || 0;
          var startT = parseFloat(el.style.top)  || 0;
          var startX = clientX;
          var startY = clientY;

          function move(cx, cy) {
            el.style.left = (startL + cx - startX) + 'px';
            el.style.top  = (startT + cy - startY) + 'px';

            // Proximity hint
            if (snapDist(b) < SNAP_RADIUS * 1.6) {
              el.classList.add('s3-near');
            } else {
              el.classList.remove('s3-near');
            }
          }

          function end() {
            el.style.zIndex = '5';
            el.classList.remove('s3-near');
            trySnap(b);
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup',   onMouseUp);
            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend',  onTouchEnd);
          }

          function onMouseMove(e)  { move(e.clientX, e.clientY); }
          function onMouseUp()     { end(); }
          function onTouchMove(e)  { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }
          function onTouchEnd()    { end(); }

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup',   onMouseUp);
          document.addEventListener('touchmove', onTouchMove, { passive: false });
          document.addEventListener('touchend',  onTouchEnd);
        }

        el.addEventListener('mousedown', function (e) {
          e.preventDefault();
          e.stopPropagation(); // don't bubble to body scene-advance handler
          start(e.clientX, e.clientY);
        });

        el.addEventListener('touchstart', function (e) {
          e.preventDefault();
          e.stopPropagation();
          start(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
      }
    }
  </script>

</body>
</html>
