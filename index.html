<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Intro</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      cursor: pointer;
    }

    /* ── Scene container ────────────────────────────────── */
    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .scene.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Full-screen background ─────────────────────────── */
    .scene-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ── Floating dialogue bubble ───────────────────────── */
    .scene-dialog {
      position: absolute;
      /* Size: dialogue is 1000×1000px — scale to ~32% viewport width */
      width: 32vw;
      max-width: 360px;
      height: auto;
      /* Position: left of character's head (upper-left quadrant) */
      left: 3vw;
      top: 6vh;
      animation: float 3.5s ease-in-out infinite;
      /* Prevent drag ghost */
      user-select: none;
      pointer-events: none;
    }

    /* ── Floating keyframes ─────────────────────────────── */
    @keyframes float {
      0%,
      100% { transform: translateY(0px);  }
      50%  { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

  <!-- Scene 1 ─────────────────────────────────────────── -->
  <div id="scene1" class="scene active">
    <div
      class="scene-bg"
      style="background-image: url('pngassets/Boss1.png');"
    ></div>
    <img
      class="scene-dialog"
      src="pngassets/Dialog 1.png"
      alt="Boss dialogue 1"
      draggable="false"
    >
  </div>

  <!-- Scene 2 ─────────────────────────────────────────── -->
  <div id="scene2" class="scene">
    <div
      class="scene-bg"
      style="background-image: url('pngassets/Boss2.png');"
    ></div>
    <img
      class="scene-dialog"
      src="pngassets/Dialog 2.png"
      alt="Boss dialogue 2"
      draggable="false"
    >
  </div>

  <script>
    (function () {
      const scenes = [
        document.getElementById('scene1'),
        document.getElementById('scene2'),
      ];
      let current = 0;

      document.body.addEventListener('click', function () {
        const next = current + 1;
        if (next >= scenes.length) return; // last scene — no more transitions

        scenes[current].classList.remove('active');
        scenes[next].classList.add('active');
        current = next;
      });
    })();
  </script>

</body>
</html>
